<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28a99e"/>
      <stop offset="100%" stop-color="#3cc4a0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#2471a3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Interlocking knot icon, centered in 160x160 viewBox -->
  <g transform="translate(16, 8)">
    <!-- Blue diamond (upper-left) -->
    <!-- Top-right arm of blue (goes OVER teal) -->
    <path d="M 44 12 L 80 32 L 80 52" stroke="url(#bg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bottom-right arm of blue (goes UNDER teal) — drawn first so teal covers it -->
    <path d="M 80 72 L 80 92 L 44 112" stroke="url(#bg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bottom-left arm of blue (goes OVER teal) -->
    <path d="M 44 112 L 8 92 L 8 72" stroke="url(#bg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Top-left arm of blue (goes UNDER teal) — drawn first so teal covers it -->
    <path d="M 8 52 L 8 32 L 44 12" stroke="url(#bg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Teal diamond (lower-right) -->
    <!-- Top-right arm -->
    <path d="M 84 42 L 120 62 L 120 82" stroke="url(#tg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bottom-right arm -->
    <path d="M 120 102 L 120 122 L 84 142" stroke="url(#tg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bottom-left arm -->
    <path d="M 84 142 L 48 122 L 48 102" stroke="url(#tg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Top-left arm -->
    <path d="M 48 82 L 48 62 L 84 42" stroke="url(#tg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Interlock corrections: blue over teal at top-right intersection -->
    <path d="M 72 52 L 80 52 L 80 72 L 72 72" stroke="url(#bg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Interlock corrections: teal over blue at bottom-left intersection -->
    <path d="M 48 82 L 56 82 L 56 102 L 48 102" stroke="url(#tg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Glow at center intersection -->
    <circle cx="64" cy="77" r="10" fill="url(#glow)" opacity="0.4"/>
  </g>
</svg>
